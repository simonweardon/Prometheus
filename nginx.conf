server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The client portal + admin dashboard (static SPA) and the JSON API are
    # served by the Node backend. We proxy those paths to it.
    #
    # Using a *variable* in proxy_pass (rather than a literal host) defers DNS
    # resolution to request time, so nginx still boots when the backend isn't
    # running (e.g. the marketing site deployed on its own) instead of crashing
    # with "host not found in upstream". Those routes simply return 502 until a
    # backend is reachable; the marketing site is always served.
    resolver ${NGINX_RESOLVER} ipv6=off valid=30s;

    # Prefix (no trailing slash) so both the collection path (e.g. /clients)
    # and sub-paths (e.g. /clients/42) are proxied to the backend.
    location /app      { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /auth     { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /clients  { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /services { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /projects { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /billing  { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /quotes   { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /portal   { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }
    location /webhooks { set $prom_backend ${BACKEND_ORIGIN}; proxy_pass $prom_backend; }

    # Marketing site (everything else)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
