server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Client portal + admin dashboard (static SPA) and the JSON API are both
    # served by the Node backend. Proxy those paths to it so the whole product
    # lives behind one origin. BACKEND_ORIGIN defaults to the backend container.
    location /app/      { proxy_pass ${BACKEND_ORIGIN}; }
    location /auth/     { proxy_pass ${BACKEND_ORIGIN}; }
    location /clients/  { proxy_pass ${BACKEND_ORIGIN}; }
    location /services/ { proxy_pass ${BACKEND_ORIGIN}; }
    location /projects/ { proxy_pass ${BACKEND_ORIGIN}; }
    location /billing/  { proxy_pass ${BACKEND_ORIGIN}; }
    location /quotes/   { proxy_pass ${BACKEND_ORIGIN}; }
    location /portal/   { proxy_pass ${BACKEND_ORIGIN}; }
    location /webhooks/ { proxy_pass ${BACKEND_ORIGIN}; }

    # Marketing site (everything else)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
