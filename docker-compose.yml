# Runs the all-in-one Prometheus image (marketing site + client portal +
# billing API in one container) with a persistent volume for the database.
#
#   JWT_SECRET=$(openssl rand -hex 32) docker compose up --build
# then open http://localhost:8080  (Client Login is in the top-right nav).
services:
  app:
    build: .
    environment:
      PORT: "8080"
      JWT_SECRET: "${JWT_SECRET:-please-change-this-in-production}"
      NODE_ENV: "${NODE_ENV:-development}"
      # Optional: real online payments. Leave blank to track billing manually.
      STRIPE_SECRET_KEY: "${STRIPE_SECRET_KEY:-}"
      STRIPE_WEBHOOK_SECRET: "${STRIPE_WEBHOOK_SECRET:-}"
    volumes:
      - prometheus-data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  prometheus-data:
