<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prometheus — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-page">
    <div class="card login-card">
      <div style="text-align:center; margin-bottom:1rem;">
        <div class="brand">Prome<span>theus</span></div>
        <div class="muted" style="font-size:0.8rem;">Client &amp; Billing Portal</div>
      </div>

      <div id="msg"></div>

      <form id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" autocomplete="username" required />
        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required />
        <button type="submit" id="submitBtn" style="width:100%; margin-top:1rem;">Sign In</button>
      </form>

      <a class="back-link muted" href="/">← Back to prometheus.com</a>
    </div>
  </div>

  <script src="common.js"></script>
  <script>
    // If already logged in, skip straight to the right place.
    if (getToken()) {
      window.location.href = getRole() === 'admin' ? 'admin.html' : 'portal.html';
    }

    // Raw login attempt — deliberately does NOT use api(), whose 401 handler
    // redirects (which would hide the error and break the admin→client retry).
    async function attempt(path, email, password) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      return { ok: res.ok, status: res.status, data };
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submitBtn');
      msg.innerHTML = '';
      btn.disabled = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        // Try staff/admin first, then fall back to client — one form for both.
        let r = await attempt('/auth/login', email, password);
        if (!r.ok) r = await attempt('/auth/client-login', email, password);
        if (r.ok && r.data && r.data.token) {
          saveSession(r.data.token, r.data.role, r.data.user);
          window.location.href = r.data.role === 'admin' ? 'admin.html' : 'portal.html';
          return;
        }
        msg.innerHTML = '<div class="msg error">Invalid email or password.</div>';
      } catch (err) {
        msg.innerHTML = '<div class="msg error">' + esc(err.message || 'Login failed') + '</div>';
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
